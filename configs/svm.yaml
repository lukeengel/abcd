use_pca: false

# Feature mode: "pca", "raw", or "roi" (uses roi_features from data.yaml)
feature_mode: "roi"

# Networks to include (from data.yaml roi_features)
roi_networks:
  #- salience
  #- dopamine
  - dopamine_core
  #- cognitive
  #- limbic
  #- thalamic

tuning:
  enabled: true
  cv_folds: 3
  scoring: roc_auc
  fbeta_beta: 0.6
  n_jobs: 1
  param_grid:
    kernel:
    - linear
    - rbf
    C:
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    gamma:
    - scale
    class_weight:
    - null
cv:
  n_outer_splits: 5
  inner_val_ratio: 0.25
  shuffle: true
baseline:
  class_weight: balanced  # Don't use class_weight - LR already handles imbalance well
  max_iter: 2000
  solver: lbfgs
  penalty: l2
  C: 0.1  # Stronger regularization for imbalanced data
model:
  kernel: linear
  C: 1.0
  gamma: scale
  class_weight: null
  probability: true
  max_iter: -1
  tol: 0.001
sweep:
  enabled: false
  param_grid:
  - kernel:
    - linear
    C:
    - 0.01
    - 0.1
    - 1.0
    - 10.0
  - kernel:
    - rbf
    C:
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    gamma:
    - scale
    - auto
    - 0.01
    - 0.1
tasks:
- name: any_vs_control
  positive_classes:
  - Clinical
  - Subclinical
  negative_class: Control
- name: clinical_vs_control
  positive_class: Clinical
  negative_class: Control
- name: subclinical_vs_control
  positive_class: Subclinical
  negative_class: Control
- name: clinical_vs_subclinical
  positive_class: Clinical
  negative_class: Subclinical
- name: extreme_high_vs_low
  positive_class: High
  negative_class: Low
  use_extreme_groups: true

# Extreme groups: create High/Low labels from raw scores
extreme_groups:
  enabled: true
  anxiety:
    column: cbcl_scr_dsm5_anxdisord_r
    high_percentile: 90   # Top 10% = High
    low_percentile: 34    # Score=0 is ~34th percentile = Low
    high_min: 5           # Or use fixed threshold: score >= 5
    low_max: 0            # score = 0
  regression:
    column: pps_y_ss_severity_score
    high_min: 30          # PQ-BC severity >= 30 (matches regression bin minimum)
    low_max: 0            # Asymptomatic (severity = 0)
  psychosis:
    column: pps_y_ss_severity_score
    high_min: 30
    low_max: 0
downsampling:
  enabled: true
  n_iterations: 100
evaluation:
  bootstrap:
    enabled: true
    iterations: 1000
  decision_threshold: 0.5  # Default, will be optimized
  threshold_metric: balanced_accuracy  # Good for imbalanced validation set
  threshold_search:
    enabled: true
    thresholds:
    - 0.10
    - 0.15
    - 0.20
    - 0.25
    - 0.30
    - 0.35
    - 0.40
    - 0.45
    - 0.50
    - 0.60
    - 0.70
interpretation:
  top_n_pcs: 10
  top_n_features: 20
  n_repeats: 3
imaging_prefixes:
- dmri
- smri_area_cdk
- smri_thick_cdk
- smri_sulc_cdk
- smri_vol_cdk
- smri_vol_scs
- mrisdp
